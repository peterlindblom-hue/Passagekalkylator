<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Passagekalk">
<meta name="theme-color" content="#f0a500">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Sliptåg – Passagekalkylator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap');

/* ── THEMES ── */
:root{
  --bg:#0d0f14;--panel:#141720;--border:#252a38;
  --accent:#f0a500;--text:#d8dce8;--muted:#5a6070;
  --green:#39d98a;--red:#ff4757;--blue:#4ea8de;--input-bg:#1a1e2b;
}
[data-theme="light"]{
  --bg:#f0f2f5;--panel:#ffffff;--border:#d0d5e0;
  --accent:#d4820a;--text:#1a1d26;--muted:#7a8099;
  --green:#1a8a56;--red:#cc2233;--blue:#2277bb;--input-bg:#e8eaf0;
}
[data-theme="navy"]{
  --bg:#0a1628;--panel:#0f1f3d;--border:#1e3060;
  --accent:#f0a500;--text:#c8d8f0;--muted:#4a6080;
  --green:#39d98a;--red:#ff4757;--blue:#60b0ff;--input-bg:#0d1830;
}
[data-theme="forest"]{
  --bg:#0d1a0f;--panel:#132016;--border:#1e3522;
  --accent:#7ec850;--text:#c8e0cc;--muted:#4a6050;
  --green:#39d98a;--red:#ff6655;--blue:#60c0a0;--input-bg:#101c12;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh;padding:20px 16px 60px;transition:background .3s,color .3s;}
.container{max-width:720px;margin:0 auto;}

/* HEADER */
header{text-align:center;margin-bottom:16px;}
.header-tag{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:6px;opacity:.8;}
h1{font-size:clamp(26px,6vw,44px);font-weight:900;letter-spacing:2px;text-transform:uppercase;line-height:1;color:var(--text);}
h1 span{color:var(--accent);}
.subtitle{margin-top:6px;font-size:14px;color:var(--muted);font-weight:300;letter-spacing:1px;}
.rail-line{width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin-top:14px;opacity:.4;}

/* TOP BAR: lang + theme */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;}
.lang-bar{display:flex;gap:5px;}
.lang-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;padding:5px 9px;cursor:pointer;transition:.15s;}
.lang-btn.active{border-color:var(--accent);color:var(--accent);}
.theme-bar{display:flex;gap:5px;align-items:center;}
.theme-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:border-color .15s;}
.theme-dot.active{border-color:var(--accent);}
.theme-dot[data-theme="dark"]{background:#0d0f14;}
.theme-dot[data-theme="light"]{background:#f0f2f5;border-color:#ccc;}
.theme-dot[data-theme="navy"]{background:#0a1628;}
.theme-dot[data-theme="forest"]{background:#0d1a0f;}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:4px;}
.tab-btn{flex:1;background:none;border:none;border-radius:6px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:2px;text-transform:uppercase;padding:10px;cursor:pointer;transition:.2s;}
.tab-btn.active{background:var(--accent);color:#000;font-weight:700;}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* CLOCK BAR */
.clock-bar{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 18px;margin-bottom:10px;}
.clock-col{display:flex;flex-direction:column;}
.clock-col.right{align-items:flex-end;}
.clock-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;}
.clock-now-time{font-family:'Share Tech Mono',monospace;font-size:22px;color:var(--text);letter-spacing:2px;}
.clock-arrow{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--border);}
.clock-finish-time{font-family:'Share Tech Mono',monospace;font-size:26px;color:var(--green);letter-spacing:2px;}
.clock-finish-time.empty{color:var(--muted);font-size:18px;}

/* PAUSE */
.pause-bar{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:16px;}
.pause-btn{flex:1;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:2px;text-transform:uppercase;padding:9px 12px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.pause-btn:hover{border-color:var(--accent);color:var(--accent);}
.pause-btn.paused{border-color:var(--red);color:var(--red);}
.pause-elapsed{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--muted);white-space:nowrap;}
.pause-elapsed.active{color:var(--red);}
.total-paused{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;}

/* START TIME */
.start-time-block{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:11px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.start-time-label{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;white-space:nowrap;}
.start-time-block input[type="time"]{background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:18px;padding:6px 10px;outline:none;transition:border-color .15s;color-scheme:dark;}
.start-time-block input[type="time"]:focus{border-color:var(--accent);}
.cancel-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;padding:6px 10px;cursor:pointer;transition:.15s;white-space:nowrap;}
.cancel-btn:hover{border-color:var(--red);color:var(--red);}
.start-time-now{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;padding:5px 8px;cursor:pointer;transition:.15s;white-space:nowrap;}
.start-time-now:hover{border-color:var(--accent);color:var(--accent);}
.start-time-clear{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px 6px;transition:color .15s;}
.start-time-clear:hover{color:var(--red);}

.import-btn{display:block;width:100%;background:none;border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:11px;cursor:pointer;margin-top:6px;margin-bottom:6px;transition:.2s;}
.import-btn:hover{background:var(--accent);color:#000;}
.zone-import-btn{width:100%;background:none;border:1px solid var(--accent);border-radius:5px;color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:8px;cursor:pointer;margin-top:10px;transition:.2s;}
.zone-import-btn:hover{background:var(--accent);color:#000;}

/* TRAIN */
.train-block{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.train-label{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;white-space:nowrap;}
.train-select{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;padding:7px 9px;outline:none;transition:border-color .15s;appearance:none;cursor:pointer;}
.train-select:focus{border-color:var(--accent);}
.train-select option{background:var(--panel);}
.save-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;padding:7px 10px;cursor:pointer;transition:.15s;white-space:nowrap;}
.save-btn:hover{border-color:var(--green);color:var(--green);}
.save-btn.saved{border-color:var(--green);color:var(--green);}

/* INPUT ROW */
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.field-block{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:8px;}
.field-block.hi{border-color:var(--accent);}
.field-label{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;white-space:nowrap;}
.field-block.hi .field-label{color:var(--accent);}
.field-block input{flex:1;min-width:0;}
.field-unit{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--muted);}

/* SLAGG */
.slagg-label{display:flex;align-items:center;gap:14px;cursor:pointer;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:0;transition:border-color .2s;user-select:none;}
.slagg-label:has(input:checked){border-color:var(--blue);}
.slagg-label input[type=checkbox]{display:none;}
.switch{position:relative;width:46px;height:26px;flex-shrink:0;}
.switch-track{position:absolute;inset:0;background:var(--border);border-radius:13px;transition:background .2s;}
.slagg-label input:checked ~ .switch .switch-track{background:var(--blue);}
.switch-thumb{position:absolute;width:20px;height:20px;top:3px;left:3px;background:var(--muted);border-radius:50%;transition:transform .2s,background .2s;}
.slagg-label input:checked ~ .switch .switch-thumb{transform:translateX(20px);background:#fff;}
.slagg-text{font-size:16px;font-weight:600;letter-spacing:1px;color:var(--text);text-transform:uppercase;}
.slagg-result{display:none;margin-top:10px;background:var(--panel);border:1px solid var(--blue);border-radius:8px;padding:16px 18px;margin-bottom:16px;}
.slagg-result.visible{display:block;}
.slagg-result-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--blue);text-transform:uppercase;margin-bottom:8px;}
.slagg-finish-time{font-family:'Share Tech Mono',monospace;font-size:32px;color:var(--blue);letter-spacing:2px;margin-bottom:8px;}
.slagg-finish-time.empty{color:var(--muted);font-size:18px;}
.slagg-detail{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);line-height:2;}
.slagg-detail span{color:var(--blue);}
.slagg-timer-block{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.slagg-timer-btn{width:100%;background:none;border:1px solid var(--blue);border-radius:6px;color:var(--blue);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:9px;cursor:pointer;transition:.2s;}
.slagg-timer-btn:hover{background:var(--blue);color:#000;}
.slagg-timer-btn.running{border-color:var(--red);color:var(--red);}
.slagg-timer-running{display:none;margin-top:8px;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--red);text-align:center;}
.slagg-timer-running.visible{display:block;}
.slagg-saved-time{display:none;margin-top:8px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--green);text-align:center;}
.slagg-saved-time.visible{display:block;}

/* GPS */
.gps-bar{display:none;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:16px;gap:12px;}
.gps-bar.visible{display:flex;}
.gps-bar.active{border-color:var(--green);}
.gps-bar.measuring{border-color:var(--accent);}
.gps-bar.error{border-color:var(--red);}
.gps-col{display:flex;flex-direction:column;flex:1;}
.gps-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;}
.gps-speed{font-family:'Share Tech Mono',monospace;font-size:28px;color:var(--green);letter-spacing:1px;}
.gps-speed.empty{color:var(--muted);font-size:18px;}
.gps-unit{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;}
.gps-progress-wrap{width:100%;height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;display:none;}
.gps-bar.measuring .gps-progress-wrap{display:block;}
.gps-progress-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;width:0%;}
.gps-status{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent);margin-top:3px;display:none;}
.gps-bar.measuring .gps-status{display:block;}
.gps-stop-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:11px;padding:6px 10px;cursor:pointer;transition:.15s;white-space:nowrap;}
.gps-stop-btn:hover{border-color:var(--red);color:var(--red);}
.gps-start-btn{display:block;width:100%;background:none;border:1px dashed var(--border);border-radius:6px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:9px;cursor:pointer;margin-bottom:10px;transition:.2s;}
.gps-start-btn:hover{border-color:var(--green);color:var(--green);}

/* PASSAGE ROWS */
.row.selected{border-color:var(--accent);background:var(--input-bg);}
.use-speed-popup{display:none;grid-column:1/-1;margin-top:4px;}
.row.selected .use-speed-popup{display:block;}
.use-speed-btn{width:100%;background:none;border:1px solid var(--accent);border-radius:4px;color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:8px;cursor:pointer;transition:background .15s,color .15s;}
.use-speed-btn:hover{background:var(--accent);color:#000;}
.use-speed-btn:disabled{border-color:var(--border);color:var(--muted);cursor:default;}
.use-speed-btn:disabled:hover{background:none;color:var(--muted);}
.col-headers{display:grid;grid-template-columns:28px 1fr 90px 32px;gap:8px;padding:0 10px 6px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.row{display:grid;grid-template-columns:28px 1fr 90px 32px;grid-template-rows:auto auto;gap:8px;align-items:center;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:6px;transition:border-color .2s,background .2s;cursor:pointer;}
.row:focus-within{border-color:var(--accent);}
.row.last-pass{opacity:.5;border-color:var(--blue);}
.row-num{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted);text-align:center;}
.row-result{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--green);text-align:right;white-space:nowrap;}
.row-result.empty{color:var(--muted);font-size:11px;}
.row-result.struck{text-decoration:line-through;color:var(--muted)!important;font-size:11px;}

input[type="number"]{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:15px;padding:7px 9px;outline:none;transition:border-color .15s;-moz-appearance:textfield;}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type="number"]:focus{border-color:var(--accent);}
input[type="number"]::placeholder{color:var(--muted);font-size:12px;}
.clear-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:13px;cursor:pointer;padding:5px 3px;width:100%;display:flex;align-items:center;justify-content:center;transition:.15s;}
.clear-btn:hover{border-color:var(--red);color:var(--red);}
.add-row-btn{width:100%;background:none;border:1px dashed var(--border);border-radius:6px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:10px;cursor:pointer;margin-top:4px;transition:.2s;}
.add-row-btn:hover{border-color:var(--accent);color:var(--accent);}

/* TOTALS */
.totals{margin-top:16px;background:var(--panel);border:1px solid var(--accent);border-radius:8px;padding:18px 20px;display:flex;flex-wrap:wrap;gap:14px;justify-content:space-between;align-items:center;}
.total-block{flex:1 1 110px;}
.total-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.total-value{font-family:'Share Tech Mono',monospace;font-size:22px;color:var(--accent);font-weight:bold;}
.total-value.big{font-size:30px;}
.divider-v{width:1px;height:40px;background:var(--border);flex:0 0 1px;}
.reset-all{display:block;width:100%;margin-top:10px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:10px;cursor:pointer;transition:.2s;}
.reset-all:hover{border-color:var(--red);color:var(--red);}

/* ── PLANNING TAB ── */
.plan-train-block{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}

/* ZONE CARD */
.zone-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;}
.zone-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.zone-title{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;}
.zone-delete{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 6px;transition:color .15s;}
.zone-delete:hover{color:var(--red);}
.zone-km-row{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;margin-bottom:10px;}
.zone-sep{font-family:'Share Tech Mono',monospace;font-size:18px;color:var(--muted);text-align:center;}
.km-input-group{display:flex;align-items:center;gap:4px;}
.km-input-group span{font-family:'Share Tech Mono',monospace;font-size:16px;color:var(--muted);}
.km-input{background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:15px;padding:7px 6px;outline:none;transition:border-color .15s;-moz-appearance:textfield;text-align:center;}
.km-input::-webkit-outer-spin-button,.km-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.km-input:focus{border-color:var(--accent);}
.km-input.wide{width:68px;}
.km-input.narrow{width:56px;}

/* ZONE SLAGG TOGGLE (compact) */
.zone-slagg-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.zone-slagg-label{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.zone-slagg-label input[type=checkbox]{display:none;}
.mini-switch{position:relative;width:36px;height:20px;flex-shrink:0;}
.mini-track{position:absolute;inset:0;background:var(--border);border-radius:10px;transition:background .2s;}
.zone-slagg-label input:checked ~ .mini-switch .mini-track{background:var(--blue);}
.mini-thumb{position:absolute;width:14px;height:14px;top:3px;left:3px;background:var(--muted);border-radius:50%;transition:transform .2s,background .2s;}
.zone-slagg-label input:checked ~ .mini-switch .mini-thumb{transform:translateX(16px);background:#fff;}
.zone-slagg-text{font-size:13px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}

/* ZONE RESULT */
.zone-result{background:var(--input-bg);border-radius:6px;padding:10px 12px;}
.zone-result-row{display:flex;justify-content:space-between;align-items:center;font-family:'Share Tech Mono',monospace;font-size:11px;margin-bottom:4px;}
.zone-result-row:last-child{margin-bottom:0;}
.zone-result-label{color:var(--muted);}
.zone-result-value{color:var(--green);font-size:13px;}
.zone-result-value.blue{color:var(--blue);}
.zone-result-value.total{color:var(--accent);font-size:15px;font-weight:bold;}
.zone-dist{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:8px;}

/* PLAN TOTALS */
.plan-totals{background:var(--panel);border:1px solid var(--accent);border-radius:8px;padding:16px 18px;margin-top:8px;}
.plan-totals-title{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:12px;}
.plan-totals-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.plan-total-block .total-label{font-size:9px;}
.plan-total-block .total-value{font-size:20px;}

.add-zone-btn{width:100%;background:none;border:1px dashed var(--border);border-radius:6px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:10px;cursor:pointer;margin-top:4px;margin-bottom:12px;transition:.2s;}
.add-zone-btn:hover{border-color:var(--accent);color:var(--accent);}
.clear-plan-btn{display:block;width:100%;background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:10px;cursor:pointer;transition:.2s;margin-top:6px;}
.clear-plan-btn:hover{border-color:var(--red);color:var(--red);}

@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.pop{animation:pop .2s ease;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 1.5s infinite;}
@media(max-width:480px){
  .col-headers{grid-template-columns:24px 1fr 78px 28px;font-size:9px;}
  .row{grid-template-columns:24px 1fr 78px 28px;}
  .total-value.big{font-size:24px;}
  .zone-km-row{grid-template-columns:1fr auto 1fr;}
  .km-input.wide{width:56px;}
  .km-input.narrow{width:46px;}
}

<body>
<div class="container">

<header>
  <div class="header-tag">// Rälsslipning</div>
  <p class="subtitle" id="subtitle-text">Tidsberäkning per passage — sliptåg</p>
  <div class="rail-line"></div>
</header>

<!-- Top bar: lang + theme -->
<div class="top-bar">
  <div class="lang-bar">
    <button class="lang-btn active" id="lang-sv" onclick="setLang('sv')">SV</button>
    <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="lang-it" onclick="setLang('it')">IT</button>
  </div>
  <div class="theme-bar">
    <div class="theme-dot active" data-theme="dark" onclick="setTheme('dark')" title="Mörkt"></div>
    <div class="theme-dot" data-theme="light" onclick="setTheme('light')" title="Ljust"></div>
    <div class="theme-dot" data-theme="navy" onclick="setTheme('navy')" title="Navy"></div>
    <div class="theme-dot" data-theme="forest" onclick="setTheme('forest')" title="Forest"></div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" id="tab-slip" onclick="switchTab('slip')" data-t="tabSlip">Slipning</button>
  <button class="tab-btn" id="tab-plan" onclick="switchTab('plan')" data-t="tabPlan">Planering</button>
</div>

<!-- ══════════════ SLIPNING TAB ══════════════ -->
<div class="tab-content active" id="content-slip">

  <div class="clock-bar">
    <div class="clock-col">
      <span class="clock-label" data-t="currentTime">Nuvarande tid</span>
      <span class="clock-now-time" id="clock-now">--:--:--</span>
    </div>
    <span class="clock-arrow">→</span>
    <div class="clock-col right">
      <span class="clock-label" data-t="estFinish">Beräknad klar (slipning)</span>
      <span class="clock-finish-time empty" id="clock-finish">–</span>
    </div>
  </div>

  <div class="pause-bar" id="pause-bar" style="display:none">
    <button class="pause-btn" id="pause-btn" onclick="togglePause()">
      <span id="pause-icon">⏸</span>
      <span id="pause-label" data-t="pause">Pausa</span>
    </button>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
      <span class="pause-elapsed" id="pause-elapsed"></span>
      <span class="total-paused" id="total-paused"></span>
    </div>
    <button class="cancel-btn" onclick="cancelSession()" data-t="cancelSession">✕ Avbryt</button>
  </div>

  <div class="start-time-block">
    <span class="start-time-label" data-t="started">Startade</span>
    <input type="time" id="start-time" oninput="onStartTimeChange()">
    <button class="start-time-now" onclick="setCurrentTime()" data-t="useNow">Nu</button>
    <button class="start-time-clear" onclick="clearStartTime()">✕</button>
  </div>

  <div class="train-block">
    <span class="train-label" data-t="train">Tåg</span>
    <select class="train-select" id="train-select" onchange="selectTrain()">
      <option value="" data-t="selectTrain">— Välj tåg —</option>
      <option value="RR40MF-1">RR40MF-1</option>
      <option value="RR64M-1">RR64M-1</option>
      <option value="RR48M-8">RR48M-8</option>
      <option value="RR48M-7">RR48M-7</option>
    </select>
    <button class="save-btn" id="save-btn" onclick="saveProfile()" data-t="saveSpeeds">SPARA HASTIGHETER</button>
  </div>

  <div class="input-row">
    <div class="field-block hi">
      <span class="field-label" data-t="distance">Sträcka</span>
      <input type="number" id="shared-meters" placeholder="t.ex. 1000" min="1" oninput="recalcAll()" inputmode="decimal">
      <span class="field-unit">m</span>
    </div>
    <div class="field-block">
      <span class="field-label" data-t="trainLength">Tåglängd</span>
      <input type="number" id="train-length" placeholder="t.ex. 100" min="0" oninput="recalcAll()" inputmode="decimal">
      <span class="field-unit">m</span>
    </div>
  </div>

  <label class="slagg-label">
    <input type="checkbox" id="slagg-toggle" onchange="recalcAll()">
    <span class="switch"><span class="switch-track"></span><span class="switch-thumb"></span></span>
    <span class="slagg-text" data-t="slaggning">Slaggning</span>
  </label>

  <div class="slagg-result" id="slagg-result">
    <div class="slagg-result-label" data-t="estWithSlagg">Beräknad tid med slaggning</div>
    <div class="slagg-finish-time empty" id="slagg-finish">–</div>
    <div class="slagg-detail" id="slagg-detail"></div>
    <div class="slagg-timer-block">
      <button class="slagg-timer-btn" id="slagg-timer-btn" onclick="toggleSlaggTimer()" data-t="startSlaggMeasure">⏱ Mät slaggningstid</button>
      <div class="slagg-timer-running" id="slagg-timer-running"></div>
      <div class="slagg-saved-time" id="slagg-saved-time"></div>
    </div>
  </div>

  <div class="gps-bar" id="gps-bar">
    <div class="gps-col">
      <span class="gps-label" data-t="gpsSpeed">GPS-hastighet</span>
      <span class="gps-speed empty" id="gps-speed">–</span>
      <span class="gps-unit">km/h</span>
      <div class="gps-progress-wrap"><div class="gps-progress-bar" id="gps-progress"></div></div>
      <span class="gps-status" id="gps-status"></span>
    </div>
    <button class="gps-stop-btn" onclick="stopGPS()" data-t="stopGps">■ Stäng av GPS</button>
  </div>
  <button class="gps-start-btn" id="gps-start-btn" onclick="startGPS()" data-t="activateGps">⊕ Aktivera GPS-hastighet</button>

  <div class="col-headers">
    <span>#</span>
    <span data-t="speed">Hastighet (km/h)</span>
    <span data-t="time">Tid</span>
    <span></span>
  </div>
  <div id="rows-container"></div>
  <button class="add-row-btn" id="add-row-btn" onclick="addRow()" data-t="addPassage">+ Lägg till passage</button>

  <div class="totals">
    <div class="total-block">
      <div class="total-label" data-t="totalDist">Totalt avstånd</div>
      <div class="total-value" id="total-meters">0 m</div>
    </div>
    <div class="divider-v"></div>
    <div class="total-block">
      <div class="total-label" data-t="passages">Passager</div>
      <div class="total-value" id="total-count">0</div>
    </div>
    <div class="divider-v"></div>
    <div class="total-block">
      <div class="total-label" data-t="totalTime">Total tid (slipning)</div>
      <div class="total-value big" id="total-time">–</div>
    </div>
  </div>
  <button class="reset-all" onclick="resetAll()" data-t="clearAll">↺ Rensa alla</button>
</div>

<!-- ══════════════ PLANERING TAB ══════════════ -->
<div class="tab-content" id="content-plan">

  <div class="plan-train-block">
    <span class="train-label" data-t="train">Tåg</span>
    <select class="train-select" id="plan-train-select" onchange="recalcPlan()">
      <option value="" data-t="selectTrain">— Välj tåg —</option>
      <option value="RR40MF-1">RR40MF-1</option>
      <option value="RR64M-1">RR64M-1</option>
      <option value="RR48M-8">RR48M-8</option>
      <option value="RR48M-7">RR48M-7</option>
    </select>
  </div>

  <div id="zones-container"></div>
  <button class="add-zone-btn" id="add-zone-btn" onclick="addZone()" data-t="addZone">+ Lägg till zon</button>

  <div class="plan-totals" id="plan-totals" style="display:none">
    <div class="plan-totals-title" data-t="planSummary">Sammanfattning</div>
    <div class="plan-totals-grid" id="plan-totals-grid"></div>
  </div>

  <button class="import-btn" onclick="importToSlip()" data-t="importToSlip" style="display:none">→ Importera till Slipning</button>
  <button class="clear-plan-btn" onclick="clearPlan()" data-t="clearPlan">↺ Rensa planering</button>
</div>

</div><!-- /container -->

<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

function generateIcon(size){
  const c=document.createElement('canvas');c.width=c.height=size;
  const x=c.getContext('2d');
  x.fillStyle='#0d0f14';x.fillRect(0,0,size,size);
  x.strokeStyle='#f0a500';x.lineWidth=size*.06;
  x.beginPath();x.moveTo(size*.1,size*.42);x.lineTo(size*.9,size*.42);x.stroke();
  x.beginPath();x.moveTo(size*.1,size*.58);x.lineTo(size*.9,size*.58);x.stroke();
  x.strokeStyle='#5a6070';x.lineWidth=size*.04;
  [.2,.35,.5,.65,.8].forEach(p=>{x.beginPath();x.moveTo(size*p,size*.35);x.lineTo(size*p,size*.65);x.stroke();});
  return c.toDataURL('image/png');
}
const iconLink=document.querySelector('link[rel="apple-touch-icon"]');
if(iconLink) iconLink.href=generateIcon(192);

// ── TRANSLATIONS ──
const T={

    cancelSession:'✕ Annulla',
  }
};
let lang='sv';
function t(key){return(T[lang]&&T[lang][key])||T.sv[key]||key;}

function setLang(l){
  lang=l;try{localStorage.setItem('appLang',l);}catch(e){}
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.id==='lang-'+l));
  applyTranslations();recalcAll();recalcPlan();
}

function applyTranslations(){
  document.getElementById('subtitle-text').textContent=t('subtitle');
  document.querySelectorAll('[data-t]').forEach(el=>{
    const key=el.getAttribute('data-t');
    if(el.tagName==='BUTTON'||el.tagName==='SPAN'||el.tagName==='DIV'||el.tagName==='OPTION') el.textContent=t(key);
  });
  const sb=document.getElementById('save-btn');
  if(sb&&!sb.classList.contains('saved')) sb.textContent=t('saveSpeeds');
  updateSlaggTimerUI();
  document.querySelectorAll('.use-speed-btn').forEach(btn=>{if(btn.disabled) btn.textContent=t('waitingGps');});
  updatePauseUI();
  // Refresh zone headers
  document.querySelectorAll('.zone-title').forEach((el,i)=>el.textContent=t('zone')+' '+(i+1));
}

// ── THEME ──
function setTheme(th){
  document.documentElement.setAttribute('data-theme',th==='dark'?'':th);
  document.querySelectorAll('.theme-dot').forEach(d=>d.classList.toggle('active',d.getAttribute('data-theme')===th));
  try{localStorage.setItem('appTheme',th);}catch(e){}
}

// ── TABS ──
function switchTab(tab){
  ['slip','plan'].forEach(id=>{
    document.getElementById('tab-'+id).classList.toggle('active',id===tab);
    document.getElementById('content-'+id).classList.toggle('active',id===tab);
  });
}

// ── STATE ──
let rowCount=0,MAX_ROWS=10,slipMinutesGlobal=0;
let isPaused=false,pauseStartTime=null,totalPausedMs=0,pauseTickInterval=null;
let slaggTimerRunning=false,slaggTimerStart=null,slaggTimerInterval=null;
let gpsWatchId=null,currentGpsSpeed=null,selectedRowId=null;
let gpsSamples=[],measuringRowId=null,measureTimeout=null;
const GPS_THRESHOLD=0.2,GPS_MIN=5,GPS_MAX_SEC=15;

// ── HELPERS ──
function padZ(n){return String(n).padStart(2,'0');}
function fmt(minutes){
  if(!isFinite(minutes)||minutes<=0) return '–';
  const h=Math.floor(minutes/60),m=Math.floor(minutes%60),s=Math.round((minutes*60)%60);
  if(h>0) return h+'h '+m+'m '+s+'s';
  if(m>0) return m+'m '+s+'s';
  return s+'s';
}
function fmtMs(ms){
  const s=Math.floor(ms/1000),m=Math.floor(s/60),sec=s%60;
  if(m>0) return m+'m '+sec+'s';return sec+'s';
}
function finishTime(totalMins){
  if(!totalMins||totalMins<=0) return null;
  const sv=document.getElementById('start-time').value;
  let base=new Date();
  if(sv){const[h,m]=sv.split(':').map(Number);base=new Date();base.setHours(h,m,0,0);}
  const off=totalPausedMs+(isPaused&&pauseStartTime?Date.now()-pauseStartTime.getTime():0);
  return new Date(base.getTime()+totalMins*60000+off);
}
function clockStr(totalMins){const d=finishTime(totalMins);if(!d)return null;return padZ(d.getHours())+':'+padZ(d.getMinutes());}
function getMeters(){return parseFloat(document.getElementById('shared-meters').value)||0;}
function getTrainLen(){return parseFloat(document.getElementById('train-length').value)||0;}
function getEff(){return getMeters()+getTrainLen();}
function slaggOn(){return document.getElementById('slagg-toggle').checked;}
function onStartTimeChange(){
  recalcAll();
  updatePauseBarVisibility();
}

function updatePauseBarVisibility(){
  const hasTime=!!document.getElementById('start-time').value;
  document.getElementById('pause-bar').style.display=hasTime?'flex':'none';
}

function clearStartTime(){
  document.getElementById('start-time').value='';
  cancelSession();
}

function setCurrentTime(){
  const now=new Date();
  document.getElementById('start-time').value=padZ(now.getHours())+':'+padZ(now.getMinutes());
  recalcAll();
  updatePauseBarVisibility();
}

function cancelSession(){
  // Reset pause state and hide pause bar
  if(isPaused){
    clearInterval(pauseTickInterval);pauseTickInterval=null;
    isPaused=false;pauseStartTime=null;
  }
  totalPausedMs=0;
  document.getElementById('start-time').value='';
  updatePauseBarVisibility();
  updatePauseUI();
  updatePauseDisplay();
  recalcAll();
}

function importZoneToSlip(zoneId){
  const dist=zoneDistance(zoneId);
  if(dist===0){
    const btn=document.getElementById('z-import-'+zoneId);
    const orig=btn.textContent;
    btn.textContent=t('importNoZone');
    setTimeout(()=>btn.textContent=orig,2500);
    return;
  }
  const trainId=document.getElementById('plan-train-select').value;
  switchTab('slip');
  if(trainId){
    document.getElementById('train-select').value=trainId;
    selectTrain();
  }
  document.getElementById('shared-meters').value=dist;
  recalcAll();
  // Flash the zone's import button
  const btn=document.getElementById('z-import-'+zoneId);
  if(btn){
    const orig=btn.textContent;
    btn.style.borderColor='var(--green)';btn.style.color='var(--green)';
    btn.textContent=t('importDone');
    setTimeout(()=>{btn.textContent=orig;btn.style.borderColor='';btn.style.color='';},2000);
  }
}

// ── CLOCK ──
function tickClock(){
  const now=new Date();
  document.getElementById('clock-now').textContent=padZ(now.getHours())+':'+padZ(now.getMinutes())+':'+padZ(now.getSeconds());
  const fin=document.getElementById('clock-finish');
  const cs=clockStr(slipMinutesGlobal);
  if(cs){fin.textContent=cs;fin.classList.remove('empty');}
  else{fin.textContent='–';fin.classList.add('empty');}
}
setInterval(tickClock,1000);tickClock();

// ── PAUSE ──
function togglePause(){
  if(!isPaused){
    isPaused=true;pauseStartTime=new Date();
    pauseTickInterval=setInterval(updatePauseDisplay,1000);
  } else {
    totalPausedMs+=Date.now()-pauseStartTime.getTime();
    isPaused=false;pauseStartTime=null;
    clearInterval(pauseTickInterval);pauseTickInterval=null;
    recalcAll();
  }
  updatePauseUI();updatePauseDisplay();
}
function updatePauseUI(){
  const btn=document.getElementById('pause-btn');
  const icon=document.getElementById('pause-icon');
  const lbl=document.getElementById('pause-label');
  if(isPaused){btn.classList.add('paused');icon.textContent='▶';lbl.textContent=t('resume');lbl.classList.add('pulse');}
  else{btn.classList.remove('paused');icon.textContent='⏸';lbl.textContent=t('pause');lbl.classList.remove('pulse');}
}
function updatePauseDisplay(){
  const elEl=document.getElementById('pause-elapsed');
  const totEl=document.getElementById('total-paused');
  if(isPaused&&pauseStartTime){elEl.textContent=t('pausedFor')+fmtMs(Date.now()-pauseStartTime.getTime());elEl.classList.add('active');}
  else{elEl.textContent='';elEl.classList.remove('active');}
  totEl.textContent=totalPausedMs>0?t('totalPaused')+fmtMs(totalPausedMs):'';

const TRAIN_DEFAULTS={
  'RR40MF-1':{length:100,speeds:[5.5,7,6,7]},
  'RR64M-1':{length:133,speeds:[0,0,0]},
  'RR48M-8':{length:113,speeds:[0,0,0]},

};
function loadProfiles(){try{const r=localStorage.getItem('trainProfiles');return r?JSON.parse(r):{};}catch(e){return{};}}
function saveProfiles(p){try{localStorage.setItem('trainProfiles',JSON.stringify(p));}catch(e){}}
function getProfile(id){return loadProfiles()[id]||TRAIN_DEFAULTS[id]||{length:0,speeds:[]};}

function selectTrain(){

function saveProfile(){
  const trainId=document.getElementById('train-select').value;if(!trainId) return;
  const length=parseFloat(document.getElementById('train-length').value)||0;
  const speeds=[];
  document.querySelectorAll('.passage-row').forEach(row=>{speeds.push(parseFloat(document.getElementById('k-'+row.dataset.id)?.value)||'');});

  const profiles=loadProfiles();
  if(!profiles[trainId]) profiles[trainId]={};
  profiles[trainId].length=length;profiles[trainId].speeds=speeds;
  saveProfiles(profiles);flashSaveBtn(true);
}

function flashSaveBtn(saved){
  const btn=document.getElementById('save-btn');

function toggleSlaggTimer(){

// ── RECALC (Slipning) ──
function recalcAll(){
  const eff=getEff();
  document.querySelectorAll('.passage-row').forEach(row=>{
    const id=row.dataset.id,k=parseFloat(document.getElementById('k-'+id)?.value)||0;
    const res=document.getElementById('r-'+id);
    row.classList.remove('last-pass');res.classList.remove('struck');
    if(eff>0&&k>0){res.textContent=fmt((eff/1000)/k*60);res.classList.remove('empty');}
    else{res.textContent='–';res.classList.add('empty');}
  });
  const rows=[];
  document.querySelectorAll('.passage-row').forEach(row=>{
    const id=row.dataset.id,k=parseFloat(document.getElementById('k-'+id)?.value)||0;
    if(eff>0&&k>0) rows.push({id,mins:(eff/1000)/k*60});
  });
  const count=rows.length;
  let slipMins=0;rows.forEach(r=>slipMins+=r.mins);slipMinutesGlobal=slipMins;
  const td=eff>0&&count>0?eff*count:0;
  document.getElementById('total-meters').textContent=td>0?td.toLocaleString('sv-SE')+' m':'0 m';
  document.getElementById('total-count').textContent=count;
  const tt=document.getElementById('total-time');
  tt.textContent=count>0?fmt(slipMins):'–';
  if(count>0){tt.classList.add('pop');setTimeout(()=>tt.classList.remove('pop'),200);}

  const slaggBox=document.getElementById('slagg-result');
  if(!slaggOn()){slaggBox.classList.remove('visible');return;}
  slaggBox.classList.add('visible');
  updateSlaggSavedDisplay();
  const slaggFin=document.getElementById('slagg-finish');
  const slaggDet=document.getElementById('slagg-detail');
  if(count<1){slaggFin.textContent='–';slaggFin.classList.add('empty');slaggDet.innerHTML='';return;}
  const lastRow=rows[count-1];
  const passesBeforeLast=rows.slice(0,count-1);
  const lastEl=document.querySelector('.passage-row[data-id="'+lastRow.id+'"]');
  if(lastEl) lastEl.classList.add('last-pass');
  const lastRes=document.getElementById('r-'+lastRow.id);
  if(lastRes){lastRes.classList.add('struck');lastRes.classList.remove('empty');}
  let beforeMins=0;passesBeforeLast.forEach(r=>beforeMins+=r.mins);
  const slaggMins=getSlaggMins(eff);
  const vantar=Math.max(0,slaggMins-lastRow.mins);
  const totalWithSlagg=beforeMins+slaggMins;
  const cs=clockStr(totalWithSlagg);
  if(cs){slaggFin.textContent=cs;slaggFin.classList.remove('empty');}
  else{slaggFin.textContent='–';slaggFin.classList.add('empty');}
  let det='';
  if(count>1) det+=t('passLabel')+' 1–'+(count-1)+': <span>'+fmt(beforeMins)+'</span><br>';
  det+=t('slagging')+' '+getSlaggSource(eff)+'<br>';
  det+=t('trainWaits')+': <span>'+fmt(vantar)+'</span>';
  slaggDet.innerHTML=det;
}

function startGPS(){
  if(!navigator.geolocation){alert('GPS stöds inte.');return;}
  document.getElementById('gps-start-btn').style.display='none';
  document.getElementById('gps-bar').classList.add('visible');
  gpsWatchId=navigator.geolocation.watchPosition(
    pos=>{
      const kmh=(pos.coords.speed||0)*3.6;currentGpsSpeed=kmh;
      document.getElementById('gps-speed').textContent=kmh.toFixed(1);
      document.getElementById('gps-speed').classList.remove('empty');
      document.getElementById('gps-bar').classList.add('active');
      document.getElementById('gps-bar').classList.remove('error');
      if(measuringRowId!==null) addGpsSample(kmh);
      updateUseSpeedBtn();
    },
    ()=>{document.getElementById('gps-bar').classList.add('error');document.getElementById('gps-speed').textContent=t('gpsError');},
    {enableHighAccuracy:true,maximumAge:500,timeout:10000}
  );
}
function stopGPS(){
  if(gpsWatchId!==null) navigator.geolocation.clearWatch(gpsWatchId);
  gpsWatchId=null;currentGpsSpeed=null;cancelMeasure();
  document.getElementById('gps-bar').classList.remove('visible','active','error','measuring');
  document.getElementById('gps-start-btn').style.display='';
  document.getElementById('gps-speed').textContent='–';
  document.getElementById('gps-speed').classList.add('empty');
}
function addGpsSample(kmh){
  gpsSamples.push(kmh);
  document.getElementById('gps-progress').style.width=Math.min(100,(gpsSamples.length/GPS_MAX_SEC)*100)+'%';
  if(gpsSamples.length>=GPS_MIN){
    const r=gpsSamples.slice(-GPS_MIN);
    if(Math.max(...r)-Math.min(...r)<=GPS_THRESHOLD){lockInSpeed(r.reduce((a,b)=>a+b,0)/r.length);return;}
  }
  document.getElementById('gps-status').textContent=t('measuring')+' ('+gpsSamples.length+'s)';
}
function lockInSpeed(kmh){
  const id=measuringRowId;cancelMeasure();
  const inp=document.getElementById('k-'+id);
  if(inp){inp.value=kmh.toFixed(1);recalcAll();}
  const row=document.querySelector('.passage-row[data-id="'+id+'"]');
  if(row) row.classList.remove('selected');
  selectedRowId=null;
  document.getElementById('gps-bar').classList.remove('measuring');
  document.getElementById('gps-status').textContent=t('stable');
  setTimeout(()=>{document.getElementById('gps-status').textContent='';},2000);
}
function cancelMeasure(){
  gpsSamples=[];measuringRowId=null;
  if(measureTimeout){clearTimeout(measureTimeout);measureTimeout=null;}
  document.getElementById('gps-progress').style.width='0%';
  document.getElementById('gps-status').textContent='';
  document.getElementById('gps-bar').classList.remove('measuring');
}
function selectRow(id){
  if(selectedRowId!==null){
    const prev=document.querySelector('.passage-row[data-id="'+selectedRowId+'"]');
    if(prev) prev.classList.remove('selected');
    if(measuringRowId===selectedRowId) cancelMeasure();
  }
  if(selectedRowId===id){selectedRowId=null;return;}
  selectedRowId=id;
  const row=document.querySelector('.passage-row[data-id="'+id+'"]');
  if(row) row.classList.add('selected');
  updateUseSpeedBtn();
}
function updateUseSpeedBtn(){
  if(selectedRowId===null) return;
  const btn=document.getElementById('use-speed-'+selectedRowId);if(!btn) return;
  const has=currentGpsSpeed!==null&&currentGpsSpeed>0.5;
  btn.disabled=!has;btn.textContent=has?t('useSpeed')+' '+currentGpsSpeed.toFixed(1)+' km/h':t('waitingGps');
}
function useCurrentSpeed(id){
  if(currentGpsSpeed===null||gpsWatchId===null) return;
  measuringRowId=id;gpsSamples=[];
  document.getElementById('gps-bar').classList.add('measuring');
  document.getElementById('gps-progress').style.width='0%';
  document.getElementById('gps-status').textContent=t('measuring');
  measureTimeout=setTimeout(()=>{
    if(gpsSamples.length>0){const avg=gpsSamples.reduce((a,b)=>a+b,0)/gpsSamples.length;lockInSpeed(avg);}
    else cancelMeasure();
  },GPS_MAX_SEC*1000);
}

let zoneCount=0;

// Parse km+m format → total meters
function kmPlusMtoM(km,m){
  return (parseFloat(km)||0)*1000+(parseFloat(m)||0);
}

// Calculate zone distance in meters
function zoneDistance(id){
  const fkm=parseFloat(document.getElementById('z-fkm-'+id)?.value)||0;
  const fm=parseFloat(document.getElementById('z-fm-'+id)?.value)||0;
  const tkm=parseFloat(document.getElementById('z-tkm-'+id)?.value)||0;
  const tm=parseFloat(document.getElementById('z-tm-'+id)?.value)||0;
  const fromM=fkm*1000+fm;const toM=tkm*1000+tm;
  return Math.abs(toM-fromM);
}

function addZone(){

      <div class="km-input-group">

        <span>+</span>
        <input type="number" class="km-input narrow" id="z-fm-${id}" placeholder="m" min="0" max="999" oninput="recalcZone(${id})" inputmode="decimal">

function deleteZone(id){
  const card=document.getElementById('zone-card-'+id);
  if(card) card.remove();
  recalcPlanTotals();savePlanState();
}

function recalcZone(id){
  const trainId=document.getElementById('plan-train-select').value;
  const dist=zoneDistance(id);
  const resultEl=document.getElementById('z-result-'+id);
  const distEl=document.getElementById('z-dist-'+id);
  const withSlagg=document.getElementById('z-slagg-'+id)?.checked;

  if(dist===0){resultEl.innerHTML='';distEl.textContent='';savePlanState();return;}

  // Show distance
  distEl.textContent=(dist/1000).toFixed(3)+' km ('+dist.toLocaleString('sv-SE')+' m)';

  if(!trainId){resultEl.innerHTML='<span style="color:var(--muted);font-family:Share Tech Mono,monospace;font-size:10px">'+t('noTrain')+'</span>';return;}

  const profile=getProfile(trainId);
  const speeds=(profile.speeds||[]).filter(s=>s&&s>0);
  const trainLen=profile.length||0;
  const effDist=dist+trainLen;

  if(speeds.length===0){resultEl.innerHTML='<span style="color:var(--muted);font-family:Share Tech Mono,monospace;font-size:10px">'+t('noSpeeds')+'</span>';return;}

  // Per-pass times
  const passMins=speeds.map(spd=>(effDist/1000)/spd*60);
  let slipMins=0;passMins.forEach(m=>slipMins+=m);

  let html='';
  // Show each pass
  passMins.forEach((mins,i)=>{
    html+='<div class="zone-result-row"><span class="zone-result-label">'+t('passLabel')+' '+(i+1)+' ('+speeds[i]+' km/h)</span><span class="zone-result-value" style="font-size:12px">'+fmt(mins)+'</span></div>';
  });
  html+='<div class="zone-result-row" style="border-top:1px solid var(--border);margin-top:4px;padding-top:4px"><span class="zone-result-label">'+t('planSlipTime')+'</span><span class="zone-result-value">'+fmt(slipMins)+'</span></div>';

  if(withSlagg){
    // Get saved slagg time or fall back to 20min/km
    const saved=loadProfiles()[trainId]?.slaggMins;
    // Scale slagg time proportionally to distance (saved was measured on a specific dist, use min/km)
    let slaggMins;
    if(saved&&saved>0){
      // We need min/km — stored as total minutes for a measured distance
      // But we don't know what distance was measured. Use it as absolute if same train.
      // Actually we saved total minutes for the eff distance at time of measurement.
      // Best approach: use as min/km ratio
      const slipEff=getEff(); // effective dist when measured
      const minkm=slipEff>0?saved/(slipEff/1000):20;
      slaggMins=(effDist/1000)*minkm;
    } else {
      slaggMins=(effDist/1000)*20;
    }
    const lastPassMins=speeds.length>0?(effDist/1000)/speeds[speeds.length-1]*60:0;
    const passesBeforeMins=slipMins-lastPassMins;
    const totalWithSlagg=passesBeforeMins+slaggMins;
    html+='<div class="zone-result-row"><span class="zone-result-label">'+t('planSlaggTime')+'</span><span class="zone-result-value blue">'+fmt(slaggMins)+'</span></div>';
    html+='<div class="zone-result-row"><span class="zone-result-label">'+t('planTotalTime')+'</span><span class="zone-result-value total">'+fmt(totalWithSlagg)+'</span></div>';
  } else {
    html+='<div class="zone-result-row"><span class="zone-result-label">'+t('planTotalTime')+'</span><span class="zone-result-value total">'+fmt(slipMins)+'</span></div>';
  }

  resultEl.innerHTML=html;
  recalcPlanTotals();
  savePlanState();
}

function recalcPlan(){
  document.querySelectorAll('.zone-card').forEach(card=>{
    const id=card.id.replace('zone-card-','');
    recalcZone(parseInt(id));
  });
  recalcPlanTotals();
}

function recalcPlanTotals(){
  let totalSlip=0,totalSlagg=0,totalDist=0,hasAny=false;
  document.querySelectorAll('.zone-card').forEach(card=>{
    const id=parseInt(card.id.replace('zone-card-',''));
    const trainId=document.getElementById('plan-train-select').value;
    const dist=zoneDistance(id);
    if(dist===0||!trainId) return;
    const profile=getProfile(trainId);
    const speeds=(profile.speeds||[]).filter(s=>s&&s>0);
    const trainLen=profile.length||0;
    const effDist=dist+trainLen;
    if(speeds.length===0) return;
    hasAny=true;
    totalDist+=dist;
    let slipMins=0;speeds.forEach(spd=>{slipMins+=(effDist/1000)/spd*60;});
    totalSlip+=slipMins;
    if(document.getElementById('z-slagg-'+id)?.checked){
      const saved=loadProfiles()[trainId]?.slaggMins;
      const slipEff=getEff();
      const minkm=(saved&&saved>0&&slipEff>0)?saved/(slipEff/1000):20;
      const slaggMins=(effDist/1000)*minkm;
      const lastPassMins=(effDist/1000)/speeds[speeds.length-1]*60;
      totalSlagg+=slipMins-lastPassMins+slaggMins-(slipMins); // net extra from slagg replacing last pass
      // simpler: just accumulate total-with-slagg
    }
  });

  const totEl=document.getElementById('plan-totals');
  const gridEl=document.getElementById('plan-totals-grid');
  if(!hasAny){totEl.style.display='none';return;}
  totEl.style.display='block';

  // Recalculate cleanly
  let grandTotal=0;
  document.querySelectorAll('.zone-card').forEach(card=>{
    const id=parseInt(card.id.replace('zone-card-',''));
    const trainId=document.getElementById('plan-train-select').value;
    const dist=zoneDistance(id);if(dist===0||!trainId) return;
    const profile=getProfile(trainId);
    const speeds=(profile.speeds||[]).filter(s=>s&&s>0);
    const trainLen=profile.length||0;const effDist=dist+trainLen;
    if(speeds.length===0) return;
    let slipMins=0;speeds.forEach(spd=>{slipMins+=(effDist/1000)/spd*60;});
    const withSlagg=document.getElementById('z-slagg-'+id)?.checked;
    if(withSlagg){
      const saved=loadProfiles()[trainId]?.slaggMins;
      const slipEff=getEff();
      const minkm=(saved&&saved>0&&slipEff>0)?saved/(slipEff/1000):20;
      const slaggMins=(effDist/1000)*minkm;
      const lastPassMins=(effDist/1000)/speeds[speeds.length-1]*60;
      grandTotal+=slipMins-lastPassMins+slaggMins;
    } else {
      grandTotal+=slipMins;
    }
    totalDist+=dist;
  });

  gridEl.innerHTML=
    '<div class="plan-total-block total-block"><div class="total-label">'+t('planDist')+'</div><div class="total-value">'+(totalDist/1000).toFixed(2)+' km</div></div>'+
    '<div class="plan-total-block total-block"><div class="total-label">'+t('planTotalTime')+'</div><div class="total-value" style="font-size:26px;color:var(--accent)">'+fmt(grandTotal)+'</div></div>';
}

// ── PLAN PERSISTENCE ──
function savePlanState(){
  const zones=[];
  document.querySelectorAll('.zone-card').forEach(card=>{
    const id=parseInt(card.id.replace('zone-card-',''));
    zones.push({
      id,
      fkm:document.getElementById('z-fkm-'+id)?.value||'',
      fm:document.getElementById('z-fm-'+id)?.value||'',
      tkm:document.getElementById('z-tkm-'+id)?.value||'',
      tm:document.getElementById('z-tm-'+id)?.value||'',
      slagg:document.getElementById('z-slagg-'+id)?.checked||false,
    });
  });
  const trainId=document.getElementById('plan-train-select').value;
  try{localStorage.setItem('planState',JSON.stringify({zones,trainId,zoneCount}));}catch(e){}
}

function loadPlanState(){
  try{
    const raw=localStorage.getItem('planState');
    if(!raw) return;
    const state=JSON.parse(raw);
    zoneCount=state.zoneCount||0;
    if(state.trainId) document.getElementById('plan-train-select').value=state.trainId;
    (state.zones||[]).forEach(z=>{
      // Recreate zone card with original id
      const id=z.id;
      const card=document.createElement('div');
      card.className='zone-card';card.id='zone-card-'+id;
      card.innerHTML=`
        <div class="zone-header">
          <span class="zone-title">${t('zone')} ${id}</span>
          <button class="zone-delete" onclick="deleteZone(${id})">✕</button>
        </div>
        <div class="zone-dist" id="z-dist-${id}"></div>
        <div class="zone-km-row">
          <div class="km-input-group">
            <input type="number" class="km-input wide" id="z-fkm-${id}" placeholder="km" min="0" oninput="recalcZone(${id})" inputmode="decimal" value="${z.fkm}">
            <span>+</span>
            <input type="number" class="km-input narrow" id="z-fm-${id}" placeholder="m" min="0" max="999" oninput="recalcZone(${id})" inputmode="decimal" value="${z.fm}">
          </div>
          <span class="zone-sep">→</span>
          <div class="km-input-group">
            <input type="number" class="km-input wide" id="z-tkm-${id}" placeholder="km" min="0" oninput="recalcZone(${id})" inputmode="decimal" value="${z.tkm}">
            <span>+</span>
            <input type="number" class="km-input narrow" id="z-tm-${id}" placeholder="m" min="0" max="999" oninput="recalcZone(${id})" inputmode="decimal" value="${z.tm}">
          </div>
        </div>
        <label class="zone-slagg-row zone-slagg-label" id="z-slagg-label-${id}">
          <input type="checkbox" id="z-slagg-${id}" onchange="recalcZone(${id})" ${z.slagg?'checked':''}>
          <span class="mini-switch"><span class="mini-track"></span><span class="mini-thumb"></span></span>
          <span class="zone-slagg-text">${t('slaggning')}</span>
        </label>
        <div class="zone-result" id="z-result-${id}"></div>
        <button class="zone-import-btn" id="z-import-${id}" onclick="importZoneToSlip(${id})">${t('importToSlip')}</button>
      `;
      document.getElementById('zones-container').appendChild(card);
    });
    recalcPlan();
  }catch(e){}
}

function clearPlan(){
  document.getElementById('zones-container').innerHTML='';
  document.getElementById('plan-train-select').value='';
  document.getElementById('plan-totals').style.display='none';
  zoneCount=0;
  try{localStorage.removeItem('planState');}catch(e){}
}

// ── INIT ──
try{lang=localStorage.getItem('appLang')||'sv';}catch(e){}
try{
  const th=localStorage.getItem('appTheme')||'dark';
  setTheme(th);
}catch(e){}
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.id==='lang-'+lang));
applyTranslations();
addRow();addRow();addRow();
loadPlanState();
</script>
</body>
</html>
